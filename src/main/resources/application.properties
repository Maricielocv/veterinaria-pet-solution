# URL de conexión a tu base de datos local
spring.datasource.url=jdbc:mysql://localhost:3306/petsolutionsdb?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
# Tu usuario de MySQL (por defecto suele ser root)
spring.datasource.username=root
# Tu contraseña de MySQL (si no le pusiste, déjalo vacío o escribe la tuya)
spring.datasource.password=1234
# Driver necesario para MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#Patron DAO para que se muestren los logs de las consultas SQL
spring.jdbc.template.query-timeout=30
# Configuración de Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# JPA Hibernate para que cree las tablas automáticamente


#  Configuración de logging para ver las consultas SQL en la consola
logging.level.org.springframework.jdbc.core=DEBUG