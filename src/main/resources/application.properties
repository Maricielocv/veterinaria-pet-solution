# URL de conexión a tu base de datos local
spring.datasource.url=jdbc:mysql://localhost:3306/veterinaria_db?useSSL=false&serverTimezone=UTC
# Tu usuario de MySQL (por defecto suele ser root)
spring.datasource.username=root
# Tu contraseña de MySQL (si no le pusiste, déjalo vacío o escribe la tuya)
spring.datasource.password=1234
# Driver necesario para MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Hibernate para que cree las tablas automáticamente
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update